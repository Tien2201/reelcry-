<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title != null ? title + ' - Reelcry' : 'Reelcry - Xem Phim Online'}"></title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --netflix-red: #e50914;
            --bg-dark: #0a0a0a;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Be Vietnam Pro', sans-serif;
            overflow-x: hidden;
        }

        .home-hero {
            position: relative;
            min-height: 48vh;
            max-height: 560px;
            display: flex;
            align-items: flex-end;
            padding-bottom: 40px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .home-hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center 15%;
            background-color: #1a1a1a;
            background-image: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%), var(--hero-img);
            filter: contrast(1.1) saturate(1.1) brightness(0.9);
            z-index: 0;
        }

        .home-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, var(--bg-dark) 2%, rgba(10, 10, 10, 0.2) 45%, rgba(10, 10, 10, 0.75) 100%),
                linear-gradient(90deg, rgba(10, 10, 10, 0.95) 0%, rgba(10, 10, 10, 0.3) 55%, rgba(10, 10, 10, 0.1) 100%);
            z-index: 1;
        }

        .home-hero-content {
            position: relative;
            z-index: 2;
            max-width: 620px;
        }

        .home-hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(229, 9, 20, 0.15);
            border: 1px solid rgba(229, 9, 20, 0.4);
            color: #ff5b62;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 30px;
            margin-bottom: 18px;
        }

        .home-hero-title {
            font-size: clamp(2.1rem, 4.5vw, 3.4rem);
            font-weight: 800;
            line-height: 1.08;
            text-shadow: 0 4px 24px rgba(0, 0, 0, 0.9);
            margin-bottom: 16px;
        }

        .home-hero-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 28px;
        }

        .home-hero-meta span {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            color: #ddd;
        }

        .home-hero-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-hero-play {
            background: white;
            color: #111;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 13px 30px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.25s;
            font-size: 0.9rem;
        }

        .btn-hero-play:hover {
            background: #eee;
            color: #111;
            transform: translateY(-2px);
        }

        .btn-hero-info {
            background: rgba(255, 255, 255, 0.12);
            color: white;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 13px 26px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.25s;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-hero-info:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .section-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 46px 0 18px;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0;
            border-left: 4px solid var(--netflix-red);
            padding-left: 14px;
            color: #f2f2f2;
        }

        .section-viewall {
            color: #999;
            font-size: 0.82rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
            background: none;
            border: none;
            cursor: pointer;
        }

        .section-viewall:hover {
            color: var(--netflix-red);
        }

        .movie-card {
            background: #161616;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
        }

        .movie-card:hover {
            transform: translateY(-6px) scale(1.03);
            z-index: 5;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            border-color: rgba(229, 9, 20, 0.5);
        }

        .movie-img-container {
            position: relative;
            aspect-ratio: 2/3;
            overflow: hidden;
            background: #1e1e1e;
        }

        .movie-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .movie-card:hover img {
            filter: brightness(0.75);
            transform: scale(1.06);
        }

        .movie-card-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0) 50%);
            pointer-events: none;
        }

        .badge-status {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--netflix-red);
            color: white;
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 5px;
            font-weight: 700;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .badge-year {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.75);
            color: #ffc107;
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 5px;
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        .movie-info {
            padding: 10px 8px;
            text-align: center;
        }

        .movie-title {
            font-weight: 600;
            font-size: 0.9rem;
            line-height: 1.3;
            height: 2.4rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #eee;
        }

        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 2.6rem;
            color: white;
            transition: 0.3s;
            opacity: 0.9;
            z-index: 3;
        }

        .movie-card:hover .play-icon {
            transform: translate(-50%, -50%) scale(1);
        }

        .vn-scroll-row {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 4px;
            scroll-snap-type: x proximity;
            scrollbar-width: none;
        }

        .vn-scroll-row::-webkit-scrollbar {
            display: none;
        }

        .vn-card-wrap {
            flex: 0 0 220px;
            scroll-snap-align: start;
        }

        .vn-row-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .vn-row-inner {
            flex: 1 1 auto;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .vn-custom-scrollbar {
            position: relative;
            height: 5px;
            margin-top: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: height 0.22s ease, background 0.22s ease;
        }

        .vn-custom-scrollbar:hover,
        .vn-custom-scrollbar.dragging {
            height: 11px;
            background: rgba(255, 255, 255, 0.16);
        }

        .vn-custom-scrollbar-thumb {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 20%;
            border-radius: 10px;
            background: var(--netflix-red);
            transition: background 0.22s ease;
        }

        .vn-custom-scrollbar:hover .vn-custom-scrollbar-thumb,
        .vn-custom-scrollbar.dragging .vn-custom-scrollbar-thumb {
            background: #ff3b47;
        }

        .vn-arrow {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .vn-arrow:hover {
            background: var(--netflix-red);
            border-color: var(--netflix-red);
        }

        @media (max-width: 480px) {
            .vn-arrow {
                width: 30px;
                height: 30px;
                font-size: 0.8rem;
            }
        }

        .pagination .page-link {
            background-color: #161616;
            border-color: rgba(255, 255, 255, 0.1);
            color: #aaa;
            margin: 0 5px;
            border-radius: 8px !important;
            transition: 0.3s;
        }

        .pagination .page-item.active .page-link {
            background-color: var(--netflix-red);
            border-color: var(--netflix-red);
            color: white;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.3);
        }

        .pagination .page-link:hover {
            background-color: var(--netflix-red);
            color: white;
        }

        /* ===== HIỆU ỨNG MƯỢT MÀ BỔ SUNG ===== */
        .movie-card {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.6s ease, transform 0.6s ease, box-shadow 0.35s ease, border-color 0.35s ease;
        }

        .movie-card.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        .home-hero-title,
        .home-hero-badge,
        .home-hero-meta,
        .home-hero-actions {
            opacity: 0;
            animation: heroFadeUp 0.8s ease forwards;
        }

        .home-hero-badge {
            animation-delay: 0.05s;
        }

        .home-hero-title {
            animation-delay: 0.15s;
        }

        .home-hero-meta {
            animation-delay: 0.28s;
        }

        .home-hero-actions {
            animation-delay: 0.4s;
        }

        @keyframes heroFadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        html {
            scroll-behavior: smooth;
        }

        ::selection {
            background: rgba(229, 9, 20, 0.35);
            color: #fff;
        }

        /* ===== HERO SLIDESHOW ===== */
        .hero-slides-wrap {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .hero-slide-item {
            position: absolute;
            inset: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease;
            display: flex;
            align-items: flex-end;
            padding-bottom: 64px;
            overflow: hidden;
        }

        .hero-slide-item.active {
            opacity: 1;
            visibility: visible;
            z-index: 2;
        }

        .hero-slide-item .home-hero-bg {
            transition: transform 8s ease-out;
            transform: scale(1.02);
        }

        .hero-slide-item.active .home-hero-bg {
            transform: scale(1.1);
        }

        .hero-slide-item .home-hero-title,
        .hero-slide-item .home-hero-badge,
        .hero-slide-item .home-hero-meta,
        .hero-slide-item .home-hero-actions {
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .hero-slide-item.active .home-hero-badge {
            transition-delay: 0.15s;
            opacity: 1;
            transform: translateY(0);
        }

        .hero-slide-item.active .home-hero-title {
            transition-delay: 0.25s;
            opacity: 1;
            transform: translateY(0);
        }

        .hero-slide-item.active .home-hero-meta {
            transition-delay: 0.35s;
            opacity: 1;
            transform: translateY(0);
        }

        .hero-slide-item.active .home-hero-actions {
            transition-delay: 0.45s;
            opacity: 1;
            transform: translateY(0);
        }

        .hero-dots {
            position: absolute;
            bottom: 24px;
            right: 5%;
            z-index: 5;
            display: flex;
            gap: 8px;
        }

        .hero-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: 0.3s;
        }

        .hero-dot.active {
            background: var(--netflix-red);
            width: 26px;
            border-radius: 4px;
        }

        .hero-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            z-index: 5;
            cursor: pointer;
            transition: 0.25s;
            opacity: 0;
        }

        .home-hero:hover .hero-arrow {
            opacity: 1;
        }

        .hero-arrow:hover {
            background: var(--netflix-red);
            border-color: var(--netflix-red);
        }

        .hero-arrow-left {
            left: 24px;
        }

        .hero-arrow-right {
            right: 24px;
        }

        @media (max-width: 768px) {
            .hero-arrow {
                display: none;
            }

            .hero-dots {
                right: 50%;
                transform: translateX(50%);
            }
        }
    </style>
</head>

<body>

    <div th:replace="~{header :: reelcry-header}"></div>

    <section class="home-hero"
        th:if="${searchTerm == null and currentCategory == null and movies != null and !movies.isEmpty()}">
        <div class="hero-slides-wrap" id="heroSlides">
            <div class="hero-slide-item" th:each="movie, iter : ${movies}" th:if="${iter.index < 6}"
                th:classappend="${iter.index == 0} ? ' active' : ''">
                <div class="home-hero-bg"
                    th:style="'background-image: url(/img-proxy?url=' + ${#uris.escapeQueryParam(movie.getImageUrl())} + ')'">
                </div>
                <div class="home-hero-overlay"></div>

                <div class="container home-hero-content">
                    <span class="home-hero-badge"><i class="fas fa-fire"></i> Đang hot</span>
                    <h1 class="home-hero-title" th:text="${movie.name}"></h1>

                    <div class="home-hero-meta">
                        <span th:if="${movie.year != 0}" th:text="${movie.year}"></span>
                        <span th:if="${movie.quality}" th:text="${movie.quality}"></span>
                        <span th:if="${movie.lang}" th:text="${movie.lang}"></span>
                        <span th:if="${movie.episode_current}" th:text="${movie.episode_current}"></span>
                    </div>

                    <div class="home-hero-actions">
                        <a class="btn-hero-play" th:href="@{/phim/{slug}(slug=${movie.slug})}">
                            <i class="fas fa-play"></i> Xem ngay
                        </a>
                        <a class="btn-hero-info" th:href="@{/phim/{slug}(slug=${movie.slug})}">
                            <i class="fas fa-circle-info"></i> Chi tiết
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="hero-dots" id="heroDots">
            <span class="hero-dot" th:each="movie, iter : ${movies}" th:if="${iter.index < 6}"
                th:classappend="${iter.index == 0} ? ' active' : ''" th:attr="data-index=${iter.index}"></span>
        </div>

        <button class="hero-arrow hero-arrow-left" id="heroPrev"><i class="fas fa-chevron-left"></i></button>
        <button class="hero-arrow hero-arrow-right" id="heroNext"><i class="fas fa-chevron-right"></i></button>
    </section>

    <div class="container my-5">

        <div id="watched-section" style="display:none;" th:if="${searchTerm == null and currentCategory == null}">
            <div class="section-title-row">
                <h2 class="section-title">Đang Xem / Đã Xem</h2>
                <button class="section-viewall" id="clear-history-btn">Xoá lịch sử <i class="fas fa-trash"></i></button>
            </div>
            <div class="vn-row-wrap">
                <button class="vn-arrow vn-arrow-left" type="button" aria-label="Cuộn trái"><i
                        class="fas fa-chevron-left"></i></button>
                <div class="vn-row-inner">
                    <div class="vn-scroll-row" id="watched-row"></div>
                    <div class="vn-custom-scrollbar">
                        <div class="vn-custom-scrollbar-thumb"></div>
                    </div>
                </div>
                <button class="vn-arrow vn-arrow-right" type="button" aria-label="Cuộn phải"><i
                        class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div id="favorites-section" style="display:none;" th:if="${searchTerm == null and currentCategory == null}">
            <div class="section-title-row">
                <h2 class="section-title">Phim Yêu Thích</h2>
                <button class="section-viewall" id="clear-favorites-btn">Xoá yêu thích <i
                        class="fas fa-trash"></i></button>
            </div>
            <div class="vn-row-wrap">
                <button class="vn-arrow vn-arrow-left" type="button" aria-label="Cuộn trái"><i
                        class="fas fa-chevron-left"></i></button>
                <div class="vn-row-inner">
                    <div class="vn-scroll-row" id="favorites-row"></div>
                    <div class="vn-custom-scrollbar">
                        <div class="vn-custom-scrollbar-thumb"></div>
                    </div>
                </div>
                <button class="vn-arrow vn-arrow-right" type="button" aria-label="Cuộn phải"><i
                        class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div th:if="${searchTerm == null and currentCategory == null and moviesVN != null and !moviesVN.isEmpty()}">
            <div class="section-title-row">
                <h2 class="section-title">Phim Việt Nam</h2>
                <a class="section-viewall" th:href="@{/filter/quoc-gia/viet-nam}">Xem tất cả <i
                        class="fas fa-chevron-right"></i></a>
            </div>
            <div class="vn-row-wrap">
                <button class="vn-arrow vn-arrow-left" type="button" aria-label="Cuộn trái"><i
                        class="fas fa-chevron-left"></i></button>
                <div class="vn-row-inner">
                    <div class="vn-scroll-row">
                        <div class="vn-card-wrap" th:each="movie : ${moviesVN}">
                            <a th:href="@{/phim/{slug}(slug=${movie.slug})}" class="text-decoration-none">
                                <div class="movie-card">
                                    <span class="badge-status" th:text="${movie?.episode_current ?: 'HD'}"></span>
                                    <span class="badge-year" th:text="${movie?.year}"></span>
                                    <div class="movie-img-container">
                                        <img th:src="${movie.getImageUrl()}" th:alt="${movie.name}" loading="lazy">
                                        <div class="movie-card-gradient"></div>
                                        <div class="play-icon"><i class="fas fa-play-circle"></i></div>
                                    </div>
                                    <div class="movie-info">
                                        <div class="movie-title" th:text="${movie.name}"></div>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                    <div class="vn-custom-scrollbar">
                        <div class="vn-custom-scrollbar-thumb"></div>
                    </div>
                </div>
                <button class="vn-arrow vn-arrow-right" type="button" aria-label="Cuộn phải"><i
                        class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div
            th:if="${searchTerm == null and currentCategory == null and moviesCinema != null and !moviesCinema.isEmpty()}">
            <div class="section-title-row">
                <h2 class="section-title">Phim Chiếu Rạp</h2>
                <a class="section-viewall" th:href="@{/filter/danh-sach/phim-chieu-rap}">Xem tất cả <i
                        class="fas fa-chevron-right"></i></a>
            </div>
            <div class="vn-row-wrap">
                <button class="vn-arrow vn-arrow-left" type="button" aria-label="Cuộn trái"><i
                        class="fas fa-chevron-left"></i></button>
                <div class="vn-row-inner">
                    <div class="vn-scroll-row">
                        <div class="vn-card-wrap" th:each="movie : ${moviesCinema}">
                            <a th:href="@{/phim/{slug}(slug=${movie.slug})}" class="text-decoration-none">
                                <div class="movie-card">
                                    <span class="badge-status" th:text="${movie?.episode_current ?: 'HD'}"></span>
                                    <span class="badge-year" th:text="${movie?.year}"></span>
                                    <div class="movie-img-container">
                                        <img th:src="${movie.getImageUrl()}" th:alt="${movie.name}" loading="lazy">
                                        <div class="movie-card-gradient"></div>
                                        <div class="play-icon"><i class="fas fa-play-circle"></i></div>
                                    </div>
                                    <div class="movie-info">
                                        <div class="movie-title" th:text="${movie.name}"></div>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                    <div class="vn-custom-scrollbar">
                        <div class="vn-custom-scrollbar-thumb"></div>
                    </div>
                </div>
                <button class="vn-arrow vn-arrow-right" type="button" aria-label="Cuộn phải"><i
                        class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="section-title-row">
            <h2 class="section-title" th:text="${title != null ? title : 'Phim Mới Cập Nhật'}"></h2>
        </div>

        <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 row-cols-xl-6 g-3 g-md-4">
            <div class="col" th:each="movie, iter : ${movies}"
                th:if="${!(searchTerm == null and currentCategory == null and iter.index == 0)}">
                <a th:href="@{/phim/{slug}(slug=${movie.slug})}" class="text-decoration-none">
                    <div class="movie-card">
                        <span class="badge-status" th:text="${movie?.episode_current ?: 'HD'}"></span>
                        <span class="badge-year" th:text="${movie?.year}"></span>

                        <div class="movie-img-container">
                            <img th:src="${movie.getImageUrl()}" th:alt="${movie.name}"

    <script>
        (function () {
            if (!('IntersectionObserver' in window)) {
                document.querySelectorAll('.movie-card').forEach(function (el) { el.classList.add('reveal'); });
                return;
            }
            var observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('reveal');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

            document.querySelectorAll('.movie-card').forEach(function (el) {
                observer.observe(el);
            });
        })();
    </script>
    <script>
        (function () {
            var slides = document.querySelectorAll('.hero-slide-item');
            var dots = document.querySelectorAll('.hero-dot');
            if (slides.length <= 1) return;

            var current = 0;
            var timer;

            function show(idx) {
                slides[current].classList.remove('active');
                if (dots[current]) dots[current].classList.remove('active');
                current = (idx + slides.length) % slides.length;
                slides[current].classList.add('active');
                if (dots[current]) dots[current].classList.add('active');
            }

            function startAutoplay() {
                clearInterval(timer);
                timer = setInterval(function () { show(current + 1); }, 6500);
            }

            document.getElementById('heroNext').addEventListener('click', function () {
                show(current + 1); startAutoplay();
            });
            document.getElementById('heroPrev').addEventListener('click', function () {
                show(current - 1); startAutoplay();
            });
            dots.forEach(function (dot, i) {
                dot.addEventListener('click', function () { show(i); startAutoplay(); });
            });

            startAutoplay();
        })();
    </script>
    <script>
        (function () {
            var scrollbars = []; // { row, track, thumb }

            function updateThumb(sb) {
                var row = sb.row, track = sb.track, thumb = sb.thumb;
                var trackWidth = track.clientWidth;
                var scrollable = row.scrollWidth - row.clientWidth;

                if (scrollable <= 1) {
                    track.style.visibility = 'hidden';
                    return;
                }
                track.style.visibility = 'visible';

                var thumbWidth = Math.max((row.clientWidth / row.scrollWidth) * trackWidth, 30);
                var maxThumbLeft = trackWidth - thumbWidth;
                var ratio = row.scrollLeft / scrollable;
                var thumbLeft = maxThumbLeft * ratio;

                thumb.style.width = thumbWidth + 'px';
                thumb.style.left = thumbLeft + 'px';
            }

            function wireRow(row) {
                if (!row || row.dataset.vnWired) return;
                row.dataset.vnWired = '1';

                row.addEventListener('wheel', function (e) {
                    if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
                        e.preventDefault();
                        row.scrollLeft += e.deltaY;
                    }
                }, { passive: false });
            }

            function wireCustomScrollbar(row, track) {
                if (!track || track.dataset.vnWired) return;
                track.dataset.vnWired = '1';

                var thumb = track.querySelector('.vn-custom-scrollbar-thumb');
                if (!thumb) return;

                var sb = { row: row, track: track, thumb: thumb };
                scrollbars.push(sb);

                row.addEventListener('scroll', function () { updateThumb(sb); });

                var dragging = false;
                var startX = 0;
                var startScrollLeft = 0;

                function onDragMove(e) {
                    if (!dragging) return;
                    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    var trackWidth = track.clientWidth;
                    var thumbWidth = thumb.clientWidth;
                    var scrollable = row.scrollWidth - row.clientWidth;
                    var trackScrollable = trackWidth - thumbWidth;
                    if (trackScrollable <= 0 || scrollable <= 0) return;
                    var deltaX = clientX - startX;
                    row.scrollLeft = startScrollLeft + (deltaX / trackScrollable) * scrollable;
                }

                function stopDrag() {
                    if (!dragging) return;
                    dragging = false;
                    track.classList.remove('dragging');
                    document.body.style.userSelect = '';
                }

                thumb.addEventListener('mousedown', function (e) {
                    dragging = true;
                    startX = e.clientX;
                    startScrollLeft = row.scrollLeft;
                    track.classList.add('dragging');
                    document.body.style.userSelect = 'none';
                    e.preventDefault();
                });
                thumb.addEventListener('touchstart', function (e) {
                    dragging = true;
                    startX = e.touches[0].clientX;
                    startScrollLeft = row.scrollLeft;
                    track.classList.add('dragging');
                }, { passive: true });

                document.addEventListener('mousemove', onDragMove);
                document.addEventListener('touchmove', onDragMove, { passive: true });
                document.addEventListener('mouseup', stopDrag);
                document.addEventListener('touchend', stopDrag);

                track.addEventListener('click', function (e) {
                    if (e.target === thumb) return;
                    var rect = track.getBoundingClientRect();
                    var clickRatio = (e.clientX - rect.left) / rect.width;
                    var scrollable = row.scrollWidth - row.clientWidth;
                    row.scrollTo({ left: clickRatio * scrollable, behavior: 'smooth' });
                });

                updateThumb(sb);
            }

            function wireWrap(wrap) {
                var row = wrap.querySelector('.vn-scroll-row');
                var track = wrap.querySelector('.vn-custom-scrollbar');
                var btnLeft = wrap.querySelector('.vn-arrow-left');
                var btnRight = wrap.querySelector('.vn-arrow-right');
                if (!row) return;

                wireRow(row);
                wireCustomScrollbar(row, track);

                function scrollByAmount(dir) {
                    var amount = row.clientWidth * 0.85 || 300;
                    row.scrollBy({ left: dir * amount, behavior: 'smooth' });
                }

                if (btnLeft) btnLeft.addEventListener('click', function () { scrollByAmount(-1); });
                if (btnRight) btnRight.addEventListener('click', function () { scrollByAmount(1); });
            }

            document.querySelectorAll('.vn-row-wrap').forEach(wireWrap);

            window.addEventListener('resize', function () {
                scrollbars.forEach(updateThumb);
            });

            // watched-row / favorites-row được đổ nội dung qua JS sau khi trang tải,
            // observe để gắn listener lại và cập nhật thanh cuộn khi nội dung đổi sau đó.
            var mo = new MutationObserver(function () {
                document.querySelectorAll('.vn-scroll-row').forEach(wireRow);
                scrollbars.forEach(updateThumb);
            });
            mo.observe(document.body, { childList: true, subtree: true });
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
